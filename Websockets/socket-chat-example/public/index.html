<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Chat</title>
    <style>
        #chat {
            border: 1px solid #ccc;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            margin-bottom: 10px;
        }
        #messageInput {
            width: 80%;
            padding: 10px;
        }
        #sendButton {
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Socket Chat Example</h1>
        <div id="chat">
        <div>Welcome to the chat!</div> 
       
        </div>
        <input type="text" id="messageInput" value="" placeholder="Type a message...">
        <button id="sendButton">Send</button>
        <button id="disconnectButton">Disconnect</button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let counter =0;
  const socket = io({
    auth: {
      serverOffset: null // Start fresh or send last known offset
    },
    ackTimeout: 5000, // Set acknowledgment timeout
    retries: 3 // Number of reconnection attempts
  });

    const chat = document.getElementById('chat');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const toggleButton = document.getElementById('disconnectButton');
        toggleButton.addEventListener('click', (e)=>{
            if (socket.connected) {
                socket.disconnect();
                toggleButton.textContent = 'Connect';
            } else {
                socket.connect();

                toggleButton.textContent = 'Disconnect';
            }
        });
    sendButton.addEventListener('click', (e)=>{
    
     if (messageInput.value) {
      const clientOffset =  `${socket.id}-${counter++}`; // Get the last known offset  
      socket.emit('chat message', messageInput.value, clientOffset);
      messageInput.value = '';
    }
    });

    // Listen for messages from the server and display them
    socket.on('chat message', (msg, serverOffset) => {
        const messageElement = document.createElement('div');
        messageElement.textContent = msg;
        chat.appendChild(messageElement);
        
        // Update the offset to the latest message ID
        socket.auth.serverOffset = serverOffset;
    });

    // Listen for disconnect event
    socket.on('connect',()=>{
        const messageElement = document.createElement('div');
        messageElement.textContent = 'You are connected.';
        chat.appendChild(messageElement);
        if (socket.recovered) {
        console.log("Reconnected and missed events were recovered!");
        } else {
            console.log("New connection or recovery failed.");
            }
    })
    socket.on('disconnect', () => {
        const messageElement = document.createElement('div');
        messageElement.textContent = 'You have been disconnected.';
        chat.appendChild(messageElement);
    });

</script>
</body>
</html>
